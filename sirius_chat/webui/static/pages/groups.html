<div class="page active" id="page-groups">
  <div class="persona-bar">
    <label>当前人格</label>
    <select class="persona-select" id="personaSelectGroups" onchange="selectPersona(this.value)">
      <option>加载中...</option>
    </select>
  </div>
  <div class="card">
    <h2>群白名单</h2>
    <div class="form-group">
      <label>添加群号</label>
      <div class="row">
        <input type="text" id="newGroupId" placeholder="输入群号" style="flex:1">
        <button class="btn" onclick="addGroup()">添加</button>
      </div>
    </div>
    <div class="tag-list" id="groupTags"></div>

    <div class="section-title">私聊白名单</div>
    <div class="form-group">
      <label>添加 QQ 号</label>
      <div class="row">
        <input type="text" id="newPrivateId" placeholder="输入 QQ 号" style="flex:1">
        <button class="btn" onclick="addPrivate()">添加</button>
      </div>
    </div>
    <div class="tag-list" id="privateTags"></div>

    <div class="section-title">功能开关</div>
    <div class="form-group">
      <label><input type="checkbox" id="enableGroupChat" checked> 启用群聊</label>
      <label><input type="checkbox" id="enablePrivateChat" checked> 启用私聊</label>
    </div>
    <button class="btn success" onclick="saveConfig()">💾 保存配置</button>
  </div>
</div>
